name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          key: x86_64-pc-windows-msvc

      - name: Build
        run: cargo build --release --target x86_64-pc-windows-msvc

      - name: Copy EXE
        shell: pwsh
        run: |
          Copy-Item "target/x86_64-pc-windows-msvc/release/clip-vault.exe" "clip-vault-windows-x86_64.exe"

      - name: Install cargo-wix
        run: cargo install cargo-wix

      - name: Build MSI
        shell: pwsh
        run: |
          cargo wix --no-build --nocapture --target x86_64-pc-windows-msvc
          $msi = Get-ChildItem -Path "target/wix/*.msi" -ErrorAction Stop | Select-Object -First 1
          Copy-Item $msi.FullName "clip-vault-windows-x86_64.msi"

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            clip-vault-windows-x86_64.exe
            clip-vault-windows-x86_64.msi
          generate_release_notes: true

  build-macos:
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-apple-darwin
            arch: x86_64
          - target: aarch64-apple-darwin
            arch: aarch64
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Set macOS deployment target
        run: echo "MACOSX_DEPLOYMENT_TARGET=11.0" >> $GITHUB_ENV

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Create macOS .app bundle
        shell: bash
        run: |
          mkdir -p "Clip Vault.app/Contents/MacOS/"
          mkdir -p "Clip Vault.app/Contents/Resources/"
          cp target/${{ matrix.target }}/release/clip-vault "Clip Vault.app/Contents/MacOS/clip-vault"
          VERSION=${GITHUB_REF_NAME#v}
          cat > "Clip Vault.app/Contents/Info.plist" << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CFBundleIdentifier</key>
            <string>com.clipvault.app</string>
            <key>CFBundleName</key>
            <string>Clip Vault</string>
            <key>CFBundleExecutable</key>
            <string>clip-vault</string>
            <key>CFBundleVersion</key>
            <string>${VERSION}</string>
            <key>CFBundleShortVersionString</key>
            <string>${VERSION}</string>
            <key>LSApplicationCategoryType</key>
            <string>public.app-category.utilities</string>
            <key>CFBundlePackageType</key>
            <string>APPL</string>
            <key>CFBundleInfoDictionaryVersion</key>
            <string>6.0</string>
          </dict>
          </plist>
          EOF
          chmod +x "Clip Vault.app/Contents/MacOS/clip-vault"

      - name: Create macOS .dmg
        shell: bash
        run: |
          mkdir -p dmg_temp
          cp -R "Clip Vault.app" dmg_temp/
          hdiutil create -volname "Clip Vault" -srcfolder dmg_temp -ov -format UDZO "clip-vault-macos-${{ matrix.arch }}.dmg"

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: clip-vault-macos-${{ matrix.arch }}.dmg
          generate_release_notes: true

  build-linux-deb:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libxcb-render0-dev libxcb-shape0-dev libxcb-xfixes0-dev \
            libxcb1-dev libxcb-randr0-dev libxcb-shm0-dev \
            libxkbcommon-dev libssl-dev \
            libgtk-3-dev \
            libglib2.0-dev \
            libayatana-appindicator3-dev \
            libdbus-1-dev \
            libxdo-dev \
            pkg-config

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          key: x86_64-unknown-linux-gnu

      - name: Build
        run: cargo build --release --target x86_64-unknown-linux-gnu

      - name: Install cargo-deb
        run: cargo install cargo-deb

      - name: Build DEB package
        run: cargo deb --no-build --target x86_64-unknown-linux-gnu

      - name: Rename DEB
        run: |
          DEB_FILE=$(find target/x86_64-unknown-linux-gnu/debian/ -name '*.deb' | head -1)
          cp "$DEB_FILE" clip-vault-linux-x86_64.deb

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: clip-vault-linux-x86_64.deb
          generate_release_notes: true

  build-linux-appimage-rpm:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libxcb-render0-dev libxcb-shape0-dev libxcb-xfixes0-dev \
            libxcb1-dev libxcb-randr0-dev libxcb-shm0-dev \
            libxkbcommon-dev libssl-dev \
            libgtk-3-dev \
            libglib2.0-dev \
            libayatana-appindicator3-dev \
            libdbus-1-dev \
            libxdo-dev \
            pkg-config \
            libfuse2

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          key: x86_64-unknown-linux-gnu-appimage-rpm

      - name: Build
        run: cargo build --release --target x86_64-unknown-linux-gnu

      - name: Install cargo-generate-rpm
        run: cargo install cargo-generate-rpm

      - name: Build RPM package
        run: |
          mkdir -p target/release
          cp target/x86_64-unknown-linux-gnu/release/clip-vault target/release/clip-vault
          cargo generate-rpm

      - name: Rename RPM
        run: |
          RPM_FILE=$(find target/generate-rpm/ -name '*.rpm' | head -1)
          cp "$RPM_FILE" clip-vault-linux-x86_64.rpm

      - name: Download linuxdeploy
        run: |
          wget -q https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
          chmod +x linuxdeploy-x86_64.AppImage

      - name: Create AppDir structure
        run: |
          mkdir -p AppDir/usr/bin
          mkdir -p AppDir/usr/share/applications
          mkdir -p AppDir/usr/share/icons/hicolor/256x256/apps
          cp target/x86_64-unknown-linux-gnu/release/clip-vault AppDir/usr/bin/
          cp assets/clip-vault.desktop AppDir/usr/share/applications/
          cp assets/clip-vault.png AppDir/usr/share/icons/hicolor/256x256/apps/

      - name: Build AppImage
        run: |
          ./linuxdeploy-x86_64.AppImage --appdir AppDir --output appimage
          mv Clip_Vault-x86_64.AppImage clip-vault-linux-x86_64.AppImage || mv *.AppImage clip-vault-linux-x86_64.AppImage

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            clip-vault-linux-x86_64.rpm
            clip-vault-linux-x86_64.AppImage
          generate_release_notes: true

  checksum:
    runs-on: ubuntu-latest
    needs: [build-windows, build-macos, build-linux-deb, build-linux-appimage-rpm]
    steps:
      - name: Download release artifacts
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release download ${{ github.ref_name }} --repo ${{ github.repository }} --dir artifacts
          cd artifacts

      - name: Generate checksums
        run: |
          cd artifacts
          sha256sum clip-vault-* > SHA256SUMS.txt
          mv SHA256SUMS.txt ../SHA256SUMS.txt

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: SHA256SUMS.txt
          generate_release_notes: true
