name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: clip-vault.exe
            asset_name: clip-vault-windows-x86_64.exe

          - os: macos-latest
            target: x86_64-apple-darwin
            artifact: clip-vault
            asset_name: clip-vault-macos-x86_64.dmg

          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: clip-vault
            asset_name: clip-vault-macos-aarch64.dmg

          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            artifact: clip-vault
            asset_name: clip-vault-linux-x86_64

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Set macOS deployment target
        if: matrix.os == 'macos-latest'
        run: echo "MACOSX_DEPLOYMENT_TARGET=11.0" >> $GITHUB_ENV

      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libxcb-render0-dev libxcb-shape0-dev libxcb-xfixes0-dev \
            libxcb1-dev libxcb-randr0-dev libxcb-shm0-dev \
            libxkbcommon-dev libssl-dev \
            libgtk-3-dev \
            libglib2.0-dev \
            libayatana-appindicator3-dev \
            libdbus-1-dev \
            libxdo-dev \
            pkg-config

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Create macOS .app bundle
        if: matrix.os == 'macos-latest'
        shell: bash
        run: |
          mkdir -p "Clip Vault.app/Contents/MacOS/"
          mkdir -p "Clip Vault.app/Contents/Resources/"
          cp target/${{ matrix.target }}/release/clip-vault "Clip Vault.app/Contents/MacOS/clip-vault"
          VERSION=${GITHUB_REF_NAME#v}
          cat > "Clip Vault.app/Contents/Info.plist" << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CFBundleIdentifier</key>
            <string>com.clipvault.app</string>
            <key>CFBundleName</key>
            <string>Clip Vault</string>
            <key>CFBundleExecutable</key>
            <string>clip-vault</string>
            <key>CFBundleVersion</key>
            <string>${VERSION}</string>
            <key>CFBundleShortVersionString</key>
            <string>${VERSION}</string>
            <key>LSApplicationCategoryType</key>
            <string>public.app-category.utilities</string>
            <key>CFBundlePackageType</key>
            <string>APPL</string>
            <key>CFBundleInfoDictionaryVersion</key>
            <string>6.0</string>
          </dict>
          </plist>
          EOF
          chmod +x "Clip Vault.app/Contents/MacOS/clip-vault"

      - name: Create macOS .dmg
        if: matrix.os == 'macos-latest'
        shell: bash
        run: |
          mkdir -p dmg_temp
          cp -R "Clip Vault.app" dmg_temp/
          hdiutil create -volname "Clip Vault" -srcfolder dmg_temp -ov -format UDZO "${{ matrix.asset_name }}"

      - name: Rename artifact (Unix)
        if: matrix.os == 'ubuntu-22.04'
        run: |
          cp target/${{ matrix.target }}/release/${{ matrix.artifact }} \
             ${{ matrix.asset_name }}

      - name: Rename artifact (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          Copy-Item "target/${{ matrix.target }}/release/${{ matrix.artifact }}" `
                    "${{ matrix.asset_name }}"

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.asset_name }}
          generate_release_notes: true
